<div id="header">
  <div class="header-row1">
    <div>
      <h1>MCU WATCH TRACKER</h1>
      <div id="stats">0 / 52 WATCHED · 0%</div>
    </div>
    <div class="header-btns">
      <div id="update-wrap">
        <button id="update-btn" onclick="checkForUpdates()">⟳ UPDATE LIST</button>
        <div id="next-release"></div>
      </div>
    </div>
  </div>
  <div class="header-row2">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all')">ALL</button>
      <button class="filter-btn" onclick="setFilter('unseen')">TO WATCH</button>
      <button class="filter-btn" onclick="setFilter('seen')">WATCHED</button>
    </div>
  </div>
  <div class="header-row3">
    <label class="type-chk active" data-type="movie"><input type="checkbox" checked onchange="toggleType('movie',this)"> FILM</label>
    <label class="type-chk active" data-type="series"><input type="checkbox" checked onchange="toggleType('series',this)"> SERIES</label>
    <label class="type-chk active" data-type="tv"><input type="checkbox" checked onchange="toggleType('tv',this)"> TV</label>
    <label class="type-chk active" data-type="special"><input type="checkbox" checked onchange="toggleType('special',this)"> SPECIAL</label>
    <label class="type-chk active" data-type="short"><input type="checkbox" checked onchange="toggleType('short',this)"> SHORT</label>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<div id="toast"></div>
<div id="next-release"></div>
<div id="content"></div>

<!-- Confirm re-check modal -->
<div id="confirm-overlay" class="hidden" onclick="if(event.target===this)closeConfirm()">
  <div id="confirm-modal">
    <div id="confirm-title">CHECK FOR UPDATES?</div>
    <div id="confirm-body"></div>
    <div id="confirm-btns">
      <button onclick="closeConfirm()">CANCEL</button>
      <button id="confirm-yes" onclick="closeConfirm();runUpdate()">CHECK ANYWAY</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div id="confirm-overlay" class="hidden" onclick="if(event.target===this)closeConfirm()">
  <div id="confirm-modal">
    <div id="confirm-title">CHECK FOR UPDATES?</div>
    <div id="confirm-body"></div>
    <div id="confirm-btns">
      <button onclick="closeConfirm()">CANCEL</button>
      <button id="confirm-ok" onclick="confirmUpdate()">YES, CHECK NOW</button>
    </div>
  </div>
</div>

<!-- API key modal -->
<div id="key-overlay" class="hidden" onclick="if(event.target===this)closeKeyModal()">
  <div id="key-modal">
    <div id="key-title">ANTHROPIC API KEY</div>
    <div id="key-desc">The update feature calls the Anthropic API. Paste your API key below — it's saved locally on your device and never sent anywhere else.</div>
    <input id="key-input" type="password" placeholder="sk-ant-..." spellcheck="false" autocomplete="off"/>
    <div id="key-hint">Get a free key at <strong>console.anthropic.com</strong></div>
    <div id="key-btns">
      <button onclick="closeKeyModal()">CANCEL</button>
      <button id="key-save-btn" onclick="saveKey()">SAVE &amp; UPDATE</button>
    </div>
    <div id="key-clear-wrap"><button id="key-clear-btn" onclick="clearKey()">Remove saved key</button></div>
  </div>
</div>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8162E;--gold:#FFD700;--bg:#0A0A0A;
  --card:#181818;--card-seen:#111;--border:#272727;--border-seen:#1e1e1e;
  --text:#e8e8e8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{background-image:radial-gradient(#1c1c1c 1px,transparent 1px);background-size:22px 22px}
#header{position:sticky;top:0;z-index:100;background:var(--red);border-bottom:4px solid #900;padding:calc(var(--safe-top) + 12px) 16px 12px}
.header-row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.header-row2{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.header-row3{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.type-chk{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.4);cursor:pointer;user-select:none;-webkit-user-select:none;transition:color .15s;padding:3px 8px;border:2px solid rgba(255,255,255,.2);border-radius:2px}
.type-chk input{display:none}
.type-chk.active{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.5)}
.type-chk::before{content:"";width:8px;height:8px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;transition:background .15s}
.type-chk.active::before{background:currentColor}
h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;line-height:1}
#stats{font-size:11px;font-weight:600;letter-spacing:1.5px;opacity:.85;margin-top:2px}
.header-btns{display:flex;gap:6px;align-self:flex-start;padding-top:2px}
#update-btn{
  background:rgba(0,0,0,0.25);border:2px solid rgba(255,255,255,0.5);
  color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1px;
  padding:5px 11px;cursor:pointer;border-radius:2px;
  transition:background .15s,opacity .15s;white-space:nowrap;
}
#update-btn:disabled{opacity:.5;cursor:not-allowed}
#update-btn.loading{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.filters{display:flex;gap:4px}
.filter-btn{background:transparent;border:2px solid rgba(255,255,255,.4);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 10px;cursor:pointer;border-radius:2px;transition:background .15s}
.filter-btn.active{background:rgba(0,0,0,.35)}
#progress-bar{margin-top:10px;height:5px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden}
#progress-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FFA500);border-radius:3px;transition:width .35s ease;width:0%}
#content{max-width:680px;margin:0 auto;padding:24px 14px calc(var(--safe-bottom) + 60px)}
/* Toast */
#toast{position:fixed;bottom:calc(var(--safe-bottom) + 24px);left:50%;transform:translateX(-50%) translateY(20px);background:#222;border:1px solid #444;color:#e8e8e8;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;padding:10px 20px;border-radius:4px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:var(--red);color:#fff}
/* Phase */
.phase-hdr{display:flex;align-items:baseline;gap:10px;border-bottom:2px solid var(--red);padding-bottom:7px;margin-bottom:10px;margin-top:30px}
.phase-sec:first-child .phase-hdr{margin-top:0}
.phase-lbl{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--red);letter-spacing:2px}
.phase-sub{font-size:13px;color:#777;font-weight:600}
.phase-cnt{margin-left:auto;font-size:13px;font-weight:700;color:var(--gold)}
/* Items */
.item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:4px;margin-bottom:5px;user-select:none;-webkit-user-select:none;transition:opacity .2s}
.item.exp{border-radius:4px 4px 0 0;margin-bottom:0}
.item.watched{background:var(--card-seen);border-color:var(--border-seen);opacity:.5}
.item.new-item{border-left:3px solid var(--gold)}

.chk{width:19px;height:19px;flex-shrink:0;border-radius:3px;border:2px solid #3a3a3a;background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.item.watched .chk{border-color:var(--red);background:var(--red)}
.chkmark{display:none}
.item.watched .chkmark{display:block}
.item-title{flex:1;font-size:15px;font-weight:600;letter-spacing:.3px;color:var(--text)}
.item.watched .item-title{color:#4a4a4a;text-decoration:line-through}
.ep-cnt{font-size:11px;font-weight:700;color:#484848;flex-shrink:0}
.ep-cnt.partial{color:var(--gold);opacity:.8}
.item-yr{font-size:11px;color:#444;font-weight:500;flex-shrink:0}
.imdb-badge{font-size:10px;font-weight:700;letter-spacing:.3px;padding:2px 6px;border-radius:2px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.imdb-great{color:#22c55e;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25)}
.imdb-ok{color:#facc15;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.25)}
.imdb-bad{color:#f87171;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25)}
.imdb-none{color:#3a3a3a;background:rgba(255,255,255,.03);border:1px solid #2a2a2a;cursor:pointer}
.ep-bub{width:40px;height:40px;border-radius:50%;border:2px solid #2a2a2a;background:transparent;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.ep-bub:active{transform:scale(.88)}
.ep-bub.seen{background:var(--red);border-color:var(--red);color:#fff}

.score-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.season-score{font-size:11px;font-weight:700;letter-spacing:.3px;padding:2px 7px;border-radius:2px;font-family:'Barlow Condensed',sans-serif}
.badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:2px;min-width:52px;text-align:center;flex-shrink:0}
.badge-movie{color:#60a5fa;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2)}
.badge-series{color:#4ade80;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2)}
.badge-special{color:#fb923c;background:rgba(251,146,60,.08);border:1px solid rgba(251,146,60,.2)}
.badge-short{color:#c084fc;background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.2)}
.badge-tv{color:#38bdf8;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2)}
.chevron{flex-shrink:0;color:#3a3a3a;transition:transform .2s,color .15s;display:flex;align-items:center;cursor:pointer;padding:4px}
.item.exp .chevron{transform:rotate(180deg);color:#777}
/* Episode panel */
.ep-panel{background:#0e0e0e;border:1px solid #222;border-top:none;border-radius:0 0 4px 4px;padding:14px 14px 16px;margin-bottom:5px}
.season-blk+.season-blk{margin-top:18px}
.season-ttl{font-family:'Bebas Neue',sans-serif;font-size:12px;color:#444;letter-spacing:2px;margin-bottom:10px}
.ep-grid{display:flex;flex-wrap:wrap;gap:8px}
/* ep-bub now defined above */
.ep-foot{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:11px;color:#3a3a3a;font-weight:600;letter-spacing:1px}
.ep-bar{flex:1;height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden}
.ep-bar-fill{height:100%;background:var(--red);border-radius:2px;transition:width .2s}
.hidden{display:none!important}
#footer{text-align:center;font-size:10px;color:#282828;font-weight:600;letter-spacing:2px;margin-top:16px}

/* Next release label */
#update-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
#next-release{font-size:10px;font-weight:700;letter-spacing:.8px;color:rgba(255,255,255,.45);text-align:right;white-space:nowrap}
#next-release.soon{color:var(--gold)}
/* Confirm modal */
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
#confirm-modal{background:#161616;border:2px solid #333;border-radius:6px;padding:24px 20px;max-width:340px;width:100%}
#confirm-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--red);margin-bottom:10px}
#confirm-body{font-size:14px;color:#888;font-weight:500;line-height:1.6;margin-bottom:20px}
#confirm-body strong{color:#ccc}
#confirm-btns{display:flex;gap:8px}
#confirm-btns button{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:9px;border-radius:3px;cursor:pointer}
#confirm-btns button:first-child{background:transparent;border:2px solid #444;color:#888}
#confirm-ok{background:var(--red);border:2px solid var(--red);color:#fff}
/* API Key Modal */
#key-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
#key-modal{background:#161616;border:2px solid #333;border-radius:6px;padding:24px 20px;max-width:360px;width:100%}
#key-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--red);margin-bottom:10px}
#key-desc{font-size:13px;color:#888;font-weight:500;line-height:1.5;margin-bottom:16px}
#key-input{width:100%;background:#0a0a0a;border:2px solid #333;color:#e8e8e8;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;padding:10px 12px;border-radius:3px;outline:none;letter-spacing:.5px}
#key-input:focus{border-color:var(--red)}
#key-hint{font-size:11px;color:#555;font-weight:600;letter-spacing:.5px;margin-top:8px;margin-bottom:18px}
#key-btns{display:flex;gap:8px}
#key-btns button{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:9px;border-radius:3px;cursor:pointer}
#key-btns button:first-child{background:transparent;border:2px solid #444;color:#888}
#key-save-btn{background:var(--red);border:2px solid var(--red);color:#fff}
#key-clear-wrap{margin-top:14px;text-align:center}
#key-clear-btn{background:none;border:none;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;text-decoration:underline}

/* Next release bar */
#next-release{max-width:680px;margin:12px auto 0;padding:0 14px}
.nr-bar{display:flex;align-items:center;gap:10px;background:#141414;border:1px solid #262626;border-left:3px solid var(--gold);border-radius:4px;padding:9px 14px}
.nr-label{font-family:'Bebas Neue',sans-serif;font-size:12px;color:#555;letter-spacing:2px;flex-shrink:0}
.nr-title{flex:1;font-size:13px;font-weight:700;color:#c8c8c8;letter-spacing:.3px}
.nr-date{font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0;letter-spacing:.5px}
.nr-soon{color:var(--red)!important}

/* Confirm modal */
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
#confirm-modal{background:#161616;border:2px solid #333;border-radius:6px;padding:22px 20px;max-width:320px;width:100%}
#confirm-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--red);margin-bottom:10px}

#confirm-btns button:first-child{background:transparent;border:2px solid #444;color:#777}
#confirm-yes{background:var(--red);border:2px solid var(--red);color:#fff}

</style>

function allItems(){return BASE_ITEMS.concat(customItems);}

function allPhases(){
  var phases=PHASES.slice();
  var maxPhase=Math.max.apply(null,allItems().map(function(i){return i.phase;}));
  var knownNums=phases.map(function(p){return p.num;});
  for(var p=Math.max.apply(null,knownNums)+1;p<=maxPhase;p++){
    phases.push({num:p,label:"Phase "+p,sub:"New Content"});
  }
  return phases;
}

function load(){
  try{
    var d=JSON.parse(localStorage.getItem("mcu3")||"{}");
    ms=d.ms||{};ep=d.ep||{};
    // Merge: BASE_SCORES as defaults, saved scores override
    sc={};
    Object.keys(BASE_SCORES).forEach(function(k){if(BASE_SCORES[k])sc[k]=BASE_SCORES[k];});
    var saved=d.sc||{};
    Object.keys(saved).forEach(function(k){sc[k]=saved[k];});
    customItems=d.customItems||[];
    // Merge any custom series data
    if(d.customSD){
      Object.keys(d.customSD).forEach(function(k){SD[k]=d.customSD[k];});
    }
  }catch(e){}
}
function save(){
  var customSD={};
  customItems.forEach(function(item){
    if(SD[item.id]) customSD[item.id]=SD[item.id];
  });
  try{localStorage.setItem("mcu3",JSON.stringify({ms:ms,ep:ep,sc:sc,customItems:customItems,customSD:customSD}));}catch(e){}
}

// ── LOGIC ─────────────────────────────────────────────
function hasSeries(id){return !!SD[id];}
function isSeen(item){
  if((item.type!=="series"&&item.type!=="tv")||!hasSeries(item.id))return !!ms[item.id];
  return SD[item.id].every(function(s){
    for(var e=1;e<=s.n;e++){if(!ep[item.id+"-"+s.s+"-"+e])return false;}
    return true;
  });
}
function getProgress(id){
  var data=SD[id];if(!data)return null;
  var done=0,total=0;
  data.forEach(function(s){total+=s.n;for(var e=1;e<=s.n;e++){if(ep[id+"-"+s.s+"-"+e])done++;}});
  return{done:done,total:total};
}
function toggleMovie(id){ms[id]=!ms[id];save();render();}
function toggleSeries(id){
  var item=allItems().find(function(i){return i.id===id;});
  if(!hasSeries(id)){toggleMovie(id);return;}
  var all=isSeen(item);
  SD[id].forEach(function(s){for(var e=1;e<=s.n;e++)ep[id+"-"+s.s+"-"+e]=!all;});
  save();render();
}
function toggleEp(id,s,e){var k=id+"-"+s+"-"+e;ep[k]=!ep[k];save();render();}
function toggleExp(id){exp[id]=!exp[id];render();}
function toggleType(type,el){
  activeTypes[type]=el.checked;
  var label=el.closest(".type-chk");
  if(label) label.classList.toggle("active",el.checked);
  applyFilter();
}

function setFilter(f){
  fil=f;
  document.querySelectorAll(".filter-btn").forEach(function(b){
    b.classList.toggle("active",b.getAttribute("onclick").indexOf("'"+f+"'")>-1);
  });
  applyFilter();
}
function applyFilter(){
  document.querySelectorAll(".item").forEach(function(el){
    var w=el.getAttribute("data-watched")==="1";
    var t=el.getAttribute("data-type");
    var typeHidden=t&&activeTypes[t]===false;
    var watchHidden=(fil==="seen"&&!w)||(fil==="unseen"&&w);
    el.classList.toggle("hidden",typeHidden||watchHidden);
  });
  document.querySelectorAll(".ep-panel").forEach(function(p){
    var row=p.previousElementSibling;
    p.classList.toggle("hidden",!!(row&&row.classList.contains("hidden")));
  });
  document.querySelectorAll(".phase-sec").forEach(function(s){
    var any=Array.from(s.querySelectorAll(".item")).some(function(i){return !i.classList.contains("hidden");});
    s.style.display=any?"":"none";
  });
}

// ── UPDATE VIA API ─────────────────────────────────────
var CHECK_INTERVAL_DAYS=30;

function checkForUpdates(){
  var lastChecked=parseInt(localStorage.getItem("mcu-last-check")||"0");
  var daysSince=Math.floor((Date.now()-lastChecked)/(1000*60*60*24));
  var apiKey=localStorage.getItem("mcu-api-key");

  // Never checked before → go straight through
  if(!lastChecked){
    if(!apiKey&&window.location.hostname!=="claude.ai"){openKeyModal();return;}
    runUpdate(); return;
  }

  // Recent check → ask for confirmation
  if(daysSince<CHECK_INTERVAL_DAYS){
    openConfirm(lastChecked); return;
  }

  // Old enough → run without confirmation
  if(!apiKey&&window.location.hostname!=="claude.ai"){openKeyModal();return;}
  runUpdate();
}

async function runUpdate(){
  var btn=document.getElementById("update-btn");
  btn.textContent="⟳ CHECKING...";
  btn.disabled=true;
  btn.classList.add("loading");
  try{
    var headers={"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
    var apiKey=localStorage.getItem("mcu-api-key");
    if(apiKey) headers["x-api-key"]=apiKey;

    var currentTitles=allItems().map(function(i){return i.title;}).join(", ");
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:headers,
      body:JSON.stringify({
        model:"claude-sonnet-4-5",
        max_tokens:1000,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user",content:
          "Search for any officially confirmed or released MCU movies, Disney+ series, or specials NOT already in this list: "+currentTitles+". "
          +"Only include officially announced Marvel/Disney content. "
          +"Reply with ONLY a raw JSON array (no markdown, no explanation). Format: "
          +'[{"title":"...","year":2026,"type":"movie","phase":6}] '
          +'type must be "movie", "series", or "special". '
          +'For series add "seasons":[{"s":1,"n":6}] if episode count is known. '
          +"Return exactly [] if nothing is new."
        }]
      })
    });

    if(!res.ok){
      var errText=await res.text();
      var msg="HTTP "+res.status;
      try{var j=JSON.parse(errText);if(j.error&&j.error.message)msg=j.error.message;}catch(e){}
      if(res.status===401||res.status===403){showToast("Auth failed — check your API key");openKeyModal();return;}
      throw new Error(msg);
    }

    var data=await res.json();
    if(data.type==="error") throw new Error((data.error&&data.error.message)||"API error");
    if(!data.content||!data.content.length) throw new Error("Empty response from API");

    var text=data.content.filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    text=text.replace(/```[a-z]*\n?/g,"").replace(/```/g,"");
    var match=text.match(/\[[\s\S]*\]/);
    if(!match) throw new Error("Response had no JSON list");
    var newItems;
    try{newItems=JSON.parse(match[0]);}
    catch(e){throw new Error("Couldn't parse JSON: "+e.message);}

    // Record successful check time
    localStorage.setItem("mcu-last-check", Date.now().toString());

    if(!Array.isArray(newItems)||newItems.length===0){showToast("Already up to date ✓");return;}

    var existingTitles=allItems().map(function(i){return i.title.toLowerCase();});
    var fresh=newItems.filter(function(item){
      return item.title&&!existingTitles.includes(item.title.toLowerCase());
    });
    if(fresh.length===0){showToast("Already up to date ✓");return;}

    var maxId=Math.max.apply(null,allItems().map(function(i){return i.id;}));
    fresh.forEach(function(item,idx){
      item.id=maxId+idx+1;
      if(item.type==="series"&&Array.isArray(item.seasons)){
        SD[item.id]=item.seasons.map(function(s){return{s:s.s,n:s.n};});
      }
      delete item.seasons;
    });
    customItems=customItems.concat(fresh);
    save();render();
    showToast("Added "+fresh.length+" new title"+(fresh.length>1?"s":"")+" ✓","success");
    fetchScoresForNewItems(fresh);

  }catch(e){
    showToast("Error: "+e.message);
  }finally{
    btn.textContent="⟳ UPDATE LIST";
    btn.disabled=false;
    btn.classList.remove("loading");
  }
}

function scoreClass(s){
  if(!s||s==="null") return "imdb-none";
  var n=parseFloat(s);
  if(n>=7.5) return "imdb-great";
  if(n>=6.0) return "imdb-ok";
  return "imdb-bad";
}
function getScore(key){ return sc[key]||null; }

function movieScoreHtml(id){
  var s=getScore("m-"+id);
  if(s&&s!=="null") return '<span class="imdb-badge '+scoreClass(s)+'">&#11088; '+s+'</span>';
  return '<span class="imdb-badge imdb-none" onclick="event.stopPropagation();fetchSingleScore('+id+')">&#11088; &ndash;</span>';
}
function seriesScoreHtml(id){
  // Show first season score on collapsed row
  var seasons=SD[id];
  if(!seasons||!seasons.length) return '';
  var firstS=seasons[0].s;
  var s=getScore("s-"+id+"-"+firstS);
  if(s&&s!=="null") return '<span class="imdb-badge '+scoreClass(s)+'">&#11088; '+s+'</span>';
  return '<span class="imdb-badge imdb-none" onclick="event.stopPropagation();fetchSeasonScore('+id+','+firstS+')">&#11088; &ndash;</span>';
}
function seasonScoreHtml(id,seasonNum){
  var s=getScore("s-"+id+"-"+seasonNum);
  if(s&&s!=="null") return '<span class="imdb-badge season-score '+scoreClass(s)+'">&#11088; '+s+'</span>';
  return '<span class="imdb-badge imdb-none season-score" onclick="event.stopPropagation();fetchSeasonScore('+id+','+seasonNum+')">&#11088; &ndash;</span>';
}

async function fetchSingleScore(id){
  var item=allItems().find(function(i){return i.id===id;});
  if(!item)return;
  var apiKey=localStorage.getItem("mcu-api-key");
  if(!apiKey){openKeyModal();return;}
  showToast("Fetching score...");
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",max_tokens:150,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user",content:'Find the IMDb rating for "'+item.title+'" ('+item.year+'). Return ONLY JSON: {"score":"7.9"} no markdown.'}]
      })
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    var data=await res.json();
    var text=data.content.filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    text=text.replace(/```[a-z]*\n?/g,"").replace(/```/g,"");
    var match=text.match(/\{[^}]*\}/);
    if(!match) throw new Error("No JSON");
    var obj=JSON.parse(match[0]);
    if(obj.score){sc["m-"+id]=String(obj.score);save();render();}
  }catch(e){showToast("Error: "+e.message);}
}

async function fetchScoresForNewItems(newItems){
  var apiKey=localStorage.getItem("mcu-api-key");
  if(!apiKey||!newItems||!newItems.length)return;
  try{
    var titles=newItems.map(function(i){return {id:i.id,title:i.title,year:i.year,type:i.type};});
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",max_tokens:600,
        tools:[{"type":"web_search_20250305","name":"web_search"}],
        messages:[{role:"user",content:'Search IMDb ratings for these MCU titles: '+JSON.stringify(titles)+'. Return ONLY a JSON array: [{"id":53,"score":"7.4"},{"id":54,"s":1,"score":"8.7"},...]. Include "s" field for series season number. No markdown.'}]
      })
    });
    if(!res.ok)return;
    var data=await res.json();
    var text=data.content.filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");
    text=text.replace(/```[a-z]*\n?/g,"").replace(/```/g,"");
    var match=text.match(/\[[\s\S]*\]/);
    if(!match)return;
    var scores=JSON.parse(match[0]);
    scores.forEach(function(entry){
      if(!entry.score||entry.score==="null")return;
      if(entry.s) sc["s-"+entry.id+"-"+entry.s]=String(entry.score);
      else sc["m-"+entry.id]=String(entry.score);
    });
    save();
  }catch(e){}
}



function render(){
  var st=document.documentElement.scrollTop||document.body.scrollTop;
  var c=document.getElementById("content");
  c.innerHTML="";
  var items=allItems();
  var phases=allPhases();

  phases.forEach(function(phase){
    var phaseItems=items.filter(function(i){return i.phase===phase.num;});
    if(!phaseItems.length)return;
    var seen=phaseItems.filter(function(i){return isSeen(i);}).length;

    var sec=document.createElement("div");
    sec.className="phase-sec";

    var hdr=document.createElement("div");
    hdr.className="phase-hdr";
    hdr.innerHTML='<span class="phase-lbl">'+phase.label+'</span>'
      +'<span class="phase-sub">'+phase.sub+'</span>'
      +'<span class="phase-cnt">'+seen+'/'+phaseItems.length+'</span>';
    sec.appendChild(hdr);

    phaseItems.forEach(function(item){
      var watched=isSeen(item);
      var isSer=(item.type==="series"||item.type==="tv")&&hasSeries(item.id);
      var isExp=!!exp[item.id];
      var prog=isSer?getProgress(item.id):null;
      var b=BADGE[item.type]||{l:"OTHER",c:"badge-special"};
      var isNew=customItems.some(function(ci){return ci.id===item.id;});

      var epHtml="";
      if(prog){
        var pcls=(prog.done>0&&prog.done<prog.total)?"ep-cnt partial":"ep-cnt";
        epHtml='<span class="'+pcls+'">'+prog.done+'/'+prog.total+'</span>';
      }
      var chevHtml=isSer?'<span class="chevron" onclick="toggleExp('+item.id+')">'
        +'<svg width="11" height="7" viewBox="0 0 11 7" fill="none">'
        +'<path d="M1 1L5.5 6L10 1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
        +'</svg></span>':"";

      var row=document.createElement("div");
      row.className="item"+(watched?" watched":"")+(isExp?" exp":"")+(isNew?" new-item":"");
      row.setAttribute("data-type",item.type);
      row.setAttribute("data-watched",watched?"1":"0");
      row.innerHTML=
        ''
        +'<div class="chk" onclick="event.stopPropagation();'+(isSer?"toggleSeries("+item.id+")":"toggleMovie("+item.id+")")+'">'
        +'<svg class="chkmark" width="10" height="8" viewBox="0 0 10 8" fill="none">'
        +'<path d="M1 3.5L3.8 7L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
        +'<span class="item-title"'+(isSer?' onclick="toggleExp('+item.id+')" style="cursor:pointer"':'')+'>'+item.title+'</span>'
        +epHtml
        +'<span class="item-yr">'+item.year+'</span>'
        +(item.type==="short"?'':isSer?seriesScoreHtml(item.id):movieScoreHtml(item.id))
        +'<span class="badge '+b.c+'">'+b.l+'</span>'
        +chevHtml;
      sec.appendChild(row);

      if(isSer&&isExp){
        var panel=document.createElement("div");
        panel.className="ep-panel";
        SD[item.id].forEach(function(season){
          var blk=document.createElement("div");
          blk.className="season-blk";
          var isFirstSeason=(season.s===SD[item.id][0].s);
          blk.innerHTML='<div class="score-row"><div class="season-ttl">SEASON '+season.s+'</div>'
            +seasonScoreHtml(item.id,season.s)
            +'</div>';
          var grid=document.createElement("div");
          grid.className="ep-grid";
          for(var e=1;e<=season.n;e++){
            var key=item.id+"-"+season.s+"-"+e;
            var bub=document.createElement("div");
            bub.className="ep-bub"+(ep[key]?" seen":"");
            bub.textContent=e;
            bub.setAttribute("onclick","toggleEp("+item.id+","+season.s+","+e+")");
            grid.appendChild(bub);
          }
          blk.appendChild(grid);
          var p=getProgress(item.id);
          var pct=p.total?Math.round(p.done/p.total*100):0;
          var foot=document.createElement("div");
          foot.className="ep-foot";
          foot.innerHTML='<span>'+p.done+' of '+p.total+' episodes</span>'
            +'<div class="ep-bar"><div class="ep-bar-fill" style="width:'+pct+'%"></div></div>';
          blk.appendChild(foot);
          panel.appendChild(blk);
        });
        sec.appendChild(panel);
      }
    });
    c.appendChild(sec);
  });

  var foot=document.createElement("div");
  foot.id="footer";
  foot.innerHTML="MARVEL CINEMATIC UNIVERSE · PHASES 1–6 · "+items.length+" TITLES<br><span style='font-size:9px;opacity:.5;letter-spacing:1px'>⭐ IMDB SCORES COLLECTED 28 APR 2026</span>";
  c.appendChild(foot);

  var total=items.length;
  var totalSeen=items.filter(function(i){return isSeen(i);}).length;
  var pct=Math.round(totalSeen/total*100);
  document.getElementById("stats").textContent=totalSeen+" / "+total+" WATCHED · "+pct+"%";
  document.getElementById("progress-fill").style.width=pct+"%";
  applyFilter();
  requestAnimationFrame(function(){
    document.documentElement.scrollTop=st;document.body.scrollTop=st;
  });
}

load();render();updateNextReleaseLabel();renderNextRelease();
